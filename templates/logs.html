{% extends "layout.html" %}
{% block content %}

<div class="card shadow p-4">
    <h3>Activity Logs</h3>

    <table class="table mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Operation</th>
                <th>Type</th>
                <th>Details</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.id }}</td>
                <td>{{ log.operation }}</td>
                <td>{{ log.data_type }}</td>
                <td>{{ log.details }}</td>
                <td>{{ log.timestamp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
