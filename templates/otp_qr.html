{% extends "layout.html" %}
{% block content %}

<div class="card shadow p-4" style="max-width: 500px; margin: auto; text-align:center;">
    <h3>Scan OTP QR Code</h3>
    <p class="mt-2">Use Google Authenticator or Microsoft Authenticator</p>

    <img src="data:image/png;base64,{{ qr }}" class="img-fluid border p-2 rounded" style="max-width:250px;">

    <p class="mt-3">
        <b>Secret Key:</b><br>
        <code>{{ secret }}</code>
    </p>

    <a href="/login" class="btn btn-primary mt-3">Continue to Login</a>
</div>

{% endblock %}
