{% extends "layout.html" %}
{% block content %}

<div class="card shadow p-4" style="max-width:480px; margin:auto;">
    <h3 class="mb-3">Forgot Password</h3>

    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" class="form-control mb-3" placeholder="Enter your registered email" required>
        <button class="btn btn-primary w-100">Send Reset Link</button>
    </form>

    <p class="mt-3">Return to <a href="/login">Login</a></p>
</div>

{% endblock %}
